<style>
  /* Apply Inter to ALL Storybook manager UI elements */
  body, .sidebar-header, .os-content, [class*="sidebar"], [class*="search"] {
    font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
  }

  /* Custom Logo Injection for SandurTech replacing text-only logo */
  .sidebar-header a {
    display: flex !important;
    align-items: center !important;
    gap: 8px !important;
    text-decoration: none !important;
  }

  .sidebar-header a::before {
    content: "";
    display: inline-block;
    width: 24px;
    height: 24px;
    background-image: url('./SandurTech-Logo-SVG.svg');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    flex-shrink: 0;
  }
</style>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "SandUI",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Web",
  "description": "A high-performance, Inter-font based UI library for React microservices.",
  "url": "https://amogharajsandur.github.io/SandUI/",
  "author": { "@type": "Person", "name": "Amogha Raj Sandur" },
  "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
}
</script>

    <div id="root"></div>

    
    <script>
      
        
          window['FEATURES'] = {
  "argTypeTargetsV7": true,
  "legacyDecoratorFileOrder": false,
  "disallowImplicitActionsInRenderV8": true
};
        
      
        
          window['REFS'] = {};
        
      
        
          window['LOGLEVEL'] = "info";
        
      
        
          window['DOCS_OPTIONS'] = {
  "defaultName": "Docs",
  "autodocs": "tag"
};
        
      
        
          window['CONFIG_TYPE'] = "PRODUCTION";
        
      
        
      
        
      
        
          window['TAGS_OPTIONS'] = {
  "dev-only": {
    "excludeFromDocsStories": true
  },
  "docs-only": {
    "excludeFromSidebar": true
  },
  "test-only": {
    "excludeFromSidebar": true,
    "excludeFromDocsStories": true
  }
};
        
      
        
          window['STORYBOOK_RENDERER'] = "react";
        
      
        
          window['STORYBOOK_BUILDER'] = "@storybook/builder-vite";
        
      
        
          window['STORYBOOK_FRAMEWORK'] = "@storybook/react-vite";
        
      
    </script>
